<!DOCTYPE html>
<html>
<head><title>Bus times</title></head>
<body style="background:#111;margin:0;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;gap:16px">
<img id="f" src="/frame.png" style="max-width:100%">
<button onclick="fetch('/flip',{method:'POST'})" style="font-size:1.2em;padding:10px 28px;cursor:pointer;border-radius:8px;border:none;background:#f5a623;color:#111;font-weight:bold">&#x1F68C; Flip direction</button>
<script>
setInterval(function(){
	document.getElementById('f').src = '/frame.png?' + Date.now();
}, 1000);
</script>
</body>
</html>
